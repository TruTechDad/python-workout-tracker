<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Tracker</title>
  </head>
  <body>
    <h1>Workout Tracker</h1>
    <h2>Add Workout</h2>
    <input id="exercise" placeholder="Exercise" />
    <input id="weight" placeholder="Weight" />
    <input id="reps" placeholder="Reps" />
    <button onclick="addWorkout()">Add Workout</button>

    <h2>Workouts</h2>
    <ul id="workoutList"></ul>

    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        background-color: #f4f4f4;
        padding: 20px;
        border-radius: 10px;
      }

      h1 {
        text-align: center;
      }

      input {
        margin: 5px;
        padding: 8px;
      }

      button {
        margin-left: 10px;
        padding: 5px 10px;
        cursor: pointer;
      }

      li {
        margin: 10px 0;
        background: white;
        padding: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
      }
    </style>

    <script>
      async function loadWorkouts() {
        const res = await fetch("http://127.0.0.1:5000/workouts");
        const data = await res.json();

        const list = document.getElementById("workoutList");
        list.innerHTML = "";

        data.forEach((w, index) => {
          const li = document.createElement("li");
          li.textContent = `${w.exercise}: ${w.weight} lbs x ${w.reps} reps`;
          const btn = document.createElement("button");
          btn.textContent = "Delete";

          // 👇 DEBUG GOES RIGHT HERE

          btn.onclick = async () => {
            console.log("Deleting index:", index);

            const res = await fetch(`http://127.0.0.1:5000/workouts/${index}`, {
              method: "DELETE",
            });

            console.log("Response status:", res.status);

            loadWorkouts();
          };

          li.appendChild(btn);

          list.appendChild(li);
        });
      }

      async function addWorkout() {
        const exercise = document.getElementById("exercise").value;
        const weight = document.getElementById("weight").value;
        const reps = document.getElementById("reps").value;

        await fetch("http://127.0.0.1:5000/workouts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ exercise, weight, reps }),
        });

        loadWorkouts();
      }
      loadWorkouts();
    </script>
  </body>
</html>
